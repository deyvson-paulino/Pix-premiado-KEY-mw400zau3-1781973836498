<style>

* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: 'Poppins', sans-serif;

body {
  background: #f5f6fa;
  color: #333;

/* ================= HEADER ================= */
.header {
  background: linear-gradient(135deg, #ff2d55, #ff6b6b);
  padding: 30px 15px;
  text-align: center;
  color: #fff;
  animation: fadeIn 1s ease;

.header img {

  border-radius: 20px;
  margin-bottom: 10px;
}

.header h1 {
  font-size: clamp(20px, 5vw, 28px);
}

.header p {
  font-size: clamp(12px, 3vw, 16px);
  opacity: 0.9;
}

/* ================= BOTÃO ================= */
.btn {
  margin-top: 15px;
  padding: 12px 20px;
  background: #fff;
  color: #ff2d55;
  border-radius: 30px;
  display: inline-block;
  font-weight: bold;
  border: none;
  font-size: clamp(12px, 3vw, 16px);
  cursor: pointer;
  transition: 0.3s;
}

.btn:hover {
  transform: scale(1.05);
}

/* ================= CONTAINER ================= */
.container {
  max-width: 600px;
  margin: auto;
  padding: 15px;
}

/* ================= CARDS ================= */
.card {
  background: #fff;
  padding: 15px;
  border-radius: 15px;
  margin-bottom: 15px;
  box-shadow: 0 5px 15px rgba(0,0,0,0.05);
}

/* ================= TEXTOS ================= */
h2 {
  margin-bottom: 10px;
  font-size: clamp(14px, 3.5vw, 18px);
}

p, li {
  font-size: clamp(12px, 3vw, 14px);
  line-height: 1.4;
}

  /* ANIMAÇÃO */
@keyframes fadeIn {
  from { opacity: 0; transform: translateY(-20px); }
  to { opacity: 1; transform: translateY(0); }
}
  
/* ================= SCREENS ================= */
.screens {
  display: flex;
  gap: 10px;
  overflow-x: auto;
  padding-bottom: 5px;
  scroll-snap-type: x mandatory;
}

.screens img {
  width: 120px;
  border-radius: 10px;
  flex-shrink: 0;
  scroll-snap-align: start;
  transition: 0.3s;
}

.screens img:hover {
  transform: scale(1.05);
}

/* ================= FOOTER ================= */
footer {
  text-align: center;
  padding: 10px;
  font-size: 12px;
  color: #777;

/* ================= RESPONSIVIDADE EXTRA ================= */

@media (min-width: 768px) {
  .header {
    padding: 50px 20px;

/* Telas grandes */
